name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ── Typecheck + Test ─────────────────────────────────────────────────────────
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dueradar_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib packages
        run: |
          pnpm exec tsc --build lib/db/tsconfig.json
          pnpm exec tsc --build lib/api-zod/tsconfig.json

      - name: Typecheck
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dueradar_test
          CLERK_SECRET_KEY: test-clerk-secret-key
          CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          FLOWC_WEBHOOK_SECRET: test-flowc-secret-for-ci
          NODE_ENV: test
        run: pnpm --filter @workspace/api-server run test

  # ── Cloudflare Pages deploy ──────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib packages
        run: |
          pnpm exec tsc --build lib/db/tsconfig.json
          pnpm exec tsc --build lib/api-zod/tsconfig.json

      - name: Build frontend
        env:
          # NODE_ENV=production ensures Vite base path is always "/" regardless of
          # BASE_PATH env var. Prevents MSYS2 path corruption on Windows builds.
          NODE_ENV: production
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: pnpm --filter @workspace/renewal-radar run build

      - name: Verify dist — gate on MSYS path corruption
        run: |
          echo "=== dist/public/index.html asset paths ==="
          grep -E 'src=|href=' artifacts/renewal-radar/dist/public/index.html
          if grep -q "Program Files" artifacts/renewal-radar/dist/public/index.html; then
            echo "CRITICAL: MSYS path corruption detected — aborting deploy"
            exit 1
          fi
          echo "✅ Asset paths verified clean"

      - name: Deploy to Cloudflare Pages
        # NOTE: We do NOT use cloudflare/wrangler-action@v3 here because it runs
        # `pnpm add wrangler` without -w flag, triggering ERR_PNPM_ADDING_TO_ROOT
        # in pnpm workspaces. Instead: install wrangler at workspace root (-w) and
        # call it directly via pnpm exec.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm add -w wrangler
          pnpm exec wrangler pages deploy artifacts/renewal-radar/dist/public \
            --project-name=dueradar \
            --branch=main \
            --commit-dirty=true

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dueradar-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Database migrations (main only) ──────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @workspace/db run migrate

  # ── Production deploy (main only) ────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/apexbusiness-systems/dueradar-api:latest
            ghcr.io/apexbusiness-systems/dueradar-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --image ghcr.io/apexbusiness-systems/dueradar-api:${{ github.sha }}
