name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # ── Typecheck + Test ─────────────────────────────────────────────────────────
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dueradar_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib packages
        run: |
          pnpm exec tsc --build lib/db/tsconfig.json
          pnpm exec tsc --build lib/api-zod/tsconfig.json

      - name: Typecheck
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dueradar_test
          CLERK_SECRET_KEY: test-clerk-secret-key
          CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          FLOWC_WEBHOOK_SECRET: test-flowc-secret-for-ci
          NODE_ENV: test
        run: pnpm --filter @workspace/api-server run test

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dueradar-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
