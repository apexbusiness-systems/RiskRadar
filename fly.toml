app = "dueradar-api"
primary_region = "iad"

[build]
  image = "ghcr.io/apexbusiness-systems/dueradar-api:latest"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  internal_port = 3001
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
